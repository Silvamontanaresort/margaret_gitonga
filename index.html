<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Margaret Gitonga - Gateway</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* The Main Container */
        .card {
            width: 100%;
            max-width: 420px;
            margin: 20px;
            background: #ffffff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            border: 1px solid #e2e8f0;
        }

        /* Hero Section with klp.jpeg Background */
        .qr-hero {
            position: relative;
            background-image: url('images/mnb.jpeg');
            background-size: cover;
            background-position: center;
            min-height: 600px;
            display: flex;
        }

        /* The Navy Transparent Overlay */
        .overlay {
            flex: 1;
            background: rgba(11, 31, 91, 0.82); /* Professional brand tint */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }

        .title {
            color: #ffffff;
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 35px;
            text-transform: uppercase;
        }

        /* Clickable QR Code Wrapper */
        .qr-link {
            text-decoration: none;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: block;
        }

        .qr-link:hover {
            transform: scale(1.05);
        }

        .qr-img {
            width: 220px;
            background: #ffffff;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: block;
        }

        .tap-hint {
            background: #ffffff;
            color: #0b1f5b;
            font-weight: bold;
            font-size: 12px;
            padding: 6px 18px;
            border-radius: 50px;
            margin-top: -15px;
            position: relative;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        /* WhatsApp Section */
        .sharing-options {
            margin-top: 40px;
            width: 100%;
        }

        .whatsapp-btn {
            display: inline-block;
            background-color: #25D366;
            color: #ffffff !important;
            padding: 15px 35px;
            text-decoration: none;
            border-radius: 14px;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3);
            transition: background 0.3s ease;
        }

        .whatsapp-btn:hover {
            background-color: #1ebe57;
        }

        .footer-text {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            margin-top: 30px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="qr-hero">
            <div class="overlay">
                
                <h2 class="title">Leverage Experts</h2>

                <a href="https://silvamontanaresort.github.io/leverage_expert/" target="_blank" class="qr-link">
                    <img src="images/leverage_expert.png" alt="QR Code" class="qr-img">
                    <div class="tap-hint">TAP TO OPEN WEBSITE</div>
                </a>

                <div class="sharing-options">
                    <a href="whatsapp://send?text=Check out Margaret Gitonga's digital card: https://silvamontanaresort.github.io/leverage_expert/" class="whatsapp-btn">
                        Share on WhatsApp 📱
                    </a>
                </div>

                <p class="footer-text">Scan or click to view full contact profile</p>
                
            </div>
        </div>
    </div>

</body>
</html>
